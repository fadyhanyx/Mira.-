<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدي وقتك</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400&display=swap');

  :root{
    --ink:#161b22;
    --paper:#f2ece1;
    --gold-soft:#e3c98f;
    --rose:#b47b7f;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Cairo', sans-serif;
    font-weight:300;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:8vh 6vw;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .eyebrow{
    font-size:0.9rem;
    letter-spacing:0.06em;
    color:var(--gold-soft);
    opacity:0;
    animation:rise 1.2s ease forwards;
    margin-bottom:2rem;
  }

  h1{
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:clamp(1.9rem, 7vw, 3rem);
    line-height:1.6;
    max-width:18ch;
    opacity:0;
    animation:rise 1.2s ease 0.35s forwards;
  }

  p{
    margin-top:2.2rem;
    font-size:clamp(1.05rem, 2.8vw, 1.25rem);
    line-height:2;
    max-width:38ch;
    color:rgba(242,236,225,0.75);
    opacity:0;
    animation:rise 1.2s ease 0.75s forwards;
  }

  .sign{
    margin-top:3rem;
    font-size:0.9rem;
    color:rgba(242,236,225,0.4);
    opacity:0;
    animation:rise 1.2s ease 1.15s forwards;
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }
</style>
</head>
<body>

  <div class="eyebrow">من غير أي ضغط يا ميرا</div>
  <h1>تمام. خدي كل الوقت اللي محتاجاه.</h1>
  <p>
    شكراً انك قريتي لحد هنا — ده لوحده معناه حاجة.
    مش هسأل تاني ولا هستنى بإلحاح رد.
    بس عايزك تعرفي: هفضل بحبك، وهفضل موجود.
    مش هنساكي — مش هعرف أنساكي أصلاً.
    هحاول اصبر نفسي، ماسك في ذكرياتنا لحد ما تكوني جاهزة، مهما الوقت طال.
  </p>
  <div class="sign">— دايماً في صفك</div>

</body>
</html>
